apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "mysql.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mysql.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # DNS tipo del pod: mysql-0.mysql-headless.<namespace>.svc.cluster.local
  serviceName: {{ include "mysql.fullname" . }}-headless
  selector:
    matchLabels:
      {{- include "mysql.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mysql.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: mysql
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: mysql
              containerPort: 3306
          envFrom:
            - secretRef:
                name: {{ include "mysql.fullname" . }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            # my.cnf montato da configmap — subPath per non sovrascrivere l'intera dir
            - name: config
              mountPath: /etc/mysql/conf.d/my.cnf
              subPath: my.cnf
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["sh", "-c", "mysql -u root -p\"${MYSQL_ROOT_PASSWORD}\" -e 'SELECT 1'"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "mysql.fullname" . }}-config
  # La PVC di uno statefulSet non è condivisa tra repliche (come invece succede per i deployment) e sopravvive alla cancellazione del pod
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"] # --> per single-instance ok, per storage condiviso meglio ReadWriteMany
        storageClassName: {{ .Values.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
