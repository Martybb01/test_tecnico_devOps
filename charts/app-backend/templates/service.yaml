apiVersion: v1
kind: Service
metadata:
  name: {{ include "app-backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app-backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}

  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "app-backend.selectorLabels" . | nindent 4 }}

---
# NLB opzionale x debug senza configurare Ingress e cert TLS
{{- if .Values.service.loadBalancer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "app-backend.fullname" . }}-lb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app-backend.labels" . | nindent 4 }}
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
  selector:
    {{- include "app-backend.selectorLabels" . | nindent 4 }}
{{- end }}
