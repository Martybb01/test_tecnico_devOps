apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "redis.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
data:
  redis.conf: |
    # AOF persistence --> ogni write viene appendata al file prima di rispondere al client
    appendonly yes
    appendfilename "appendonly.aof"
    appendfsync everysec # flusso su disco ogni sec

    dir /data

    maxmemory-policy allkeys-lru # rimuove le chiavi usate meno recentemente 

    {{- if .Values.auth.password }}
    requirepass {{ .Values.auth.password }}
    {{- end }}
